<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Space Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <main class="landing">
    <h1 class="landing-title">Space Dashboard</h1>
    <p class="landing-subtitle">Dornbirn, Austria — 47.41°N 9.74°E</p>

    <nav class="view-cards">
      <a href="/stargazer/" class="view-card">
        <span class="view-card-icon">🔭</span>
        <h2>Stargazer</h2>
        <p>Tonight's sky conditions, Go/No-Go for stargazing, moon phase, visible planets</p>
      </a>
      <a href="/cosmic/" class="view-card">
        <span class="view-card-icon">🛰️</span>
        <h2>Cosmic Overview</h2>
        <p>3D solar system with spacecraft positions, asteroid flybys, space weather</p>
      </a>
    </nav>
  </main>
</body>
</html>
